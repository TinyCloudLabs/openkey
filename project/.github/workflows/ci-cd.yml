name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openkey
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: openkey_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build shared package
      run: cd shared && npm run build
    
    - name: Run linters
      run: npm run lint
    
    - name: Run backend unit tests
      run: cd backend && npm test
      env:
        DATABASE_URL: postgresql://openkey:testpass@localhost:5432/openkey_test
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test-secret-key-32-characters
        ENCRYPTION_KEY: test-encryption-key-32-chars
    
    - name: Run frontend unit tests
      run: cd frontend && npm test
    
    - name: Build backend
      run: cd backend && npm run build
      env:
        DATABASE_URL: postgresql://openkey:testpass@localhost:5432/openkey_test
    
    - name: Build frontend
      run: cd frontend && npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    
    - name: Install Playwright browsers
      run: cd tests && npx playwright install --with-deps
    
    - name: Run integration tests
      run: cd tests && npm run integration
      env:
        DATABASE_URL: postgresql://openkey:testpass@localhost:5432/openkey_test
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test-secret-key-32-characters
        ENCRYPTION_KEY: test-encryption-key-32-chars
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: tests/test-results/
        
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run security audit
      run: npm audit --audit-level high
    
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
        
  deploy-staging:
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to staging
      run: |
        cd deployments/staging
        echo "${{ secrets.STAGING_KEY }}" > staging.pem
        chmod 600 staging.pem
        ./deploy-staging.sh
      env:
        STAGING_HOST: ${{ secrets.STAGING_HOST }}
        STAGING_USER: ${{ secrets.STAGING_USER }}
        STAGING_KEY_PATH: staging.pem
        STAGING_REGISTRY: ${{ secrets.STAGING_REGISTRY }}
        
  deploy-production:
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to production
      run: |
        cd deployments/production
        echo "${{ secrets.PROD_KEY }}" > production.pem
        chmod 600 production.pem
        ./deploy-production.sh
      env:
        PROD_HOST: ${{ secrets.PROD_HOST }}
        PROD_USER: ${{ secrets.PROD_USER }}
        PROD_KEY_PATH: production.pem
        PROD_REGISTRY: ${{ secrets.PROD_REGISTRY }}