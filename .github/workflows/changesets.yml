name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Packages
        run: npx turbo build --force

      - name: Check for publishable changesets
        id: check
        run: |
          # Run changeset status to see if any non-ignored packages have pending bumps
          if bun changeset status 2>&1 | grep -q "NO packages"; then
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            echo "No publishable changesets — will attempt to publish if versions are unpublished"
          else
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
            echo "Found publishable changesets — will create version PR"
          fi

      - name: Create Release Pull Request
        if: steps.check.outputs.has_changesets == 'true'
        uses: changesets/action@v1
        with:
          version: bun changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Publish to npm
        if: steps.check.outputs.has_changesets == 'false'
        run: bun run publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

