name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Packages
        run: npx turbo build --force

      - name: Check for changesets
        id: check
        run: |
          COUNT=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)
          echo "pending=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -gt 0 ]; then
            echo "Found $COUNT pending changeset(s) — will create version PR"
          else
            echo "No pending changesets — will publish if versions are unpublished"
          fi

      - name: Create Release Pull Request
        if: steps.check.outputs.pending != '0'
        uses: changesets/action@v1
        with:
          version: bun changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Publish to npm
        if: steps.check.outputs.pending == '0'
        run: bun run publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Notify consumer repos of new release
        if: steps.check.outputs.pending == '0' && success()
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          VERSION=$(jq -r '.version' packages/sdk/package.json)
          PACKAGES=$(jq -nc --arg v "$VERSION" '{"@openkey/sdk": $v}')

          PAYLOAD=$(jq -nc \
            --arg source "openkey" \
            --arg version "$VERSION" \
            --argjson packages "$PACKAGES" \
            '{source: $source, version: $version, packages: $packages}')

          REPOS=(
            "tinycloudlabs/OpenCredentials"
            "tinycloudlabs/remember"
            "tinycloudlabs/js-sdk"
            "tinycloudlabs/lightning"
          )

          for REPO in "${REPOS[@]}"; do
            echo "Dispatching dependency-bump to $REPO"
            curl -s -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: token $DISPATCH_TOKEN" \
              "https://api.github.com/repos/$REPO/dispatches" \
              -d "$(jq -nc --argjson payload "$PAYLOAD" '{event_type: "dependency-bump", client_payload: $payload}')"
          done
