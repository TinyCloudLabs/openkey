name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Packages
        run: bun run build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun run publish
          version: bun changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Notify consumer repos of new release
        if: steps.changesets.outputs.published == 'true'
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          # Convert changesets array [{name, version}] to object {name: version}
          PACKAGES=$(echo "$PUBLISHED_PACKAGES" | jq -c '[.[] | {(.name): .version}] | add')

          # Use the first published package version as the top-level version
          VERSION=$(echo "$PUBLISHED_PACKAGES" | jq -r '.[0].version')

          PAYLOAD=$(jq -nc \
            --arg source "openkey" \
            --arg version "$VERSION" \
            --argjson packages "$PACKAGES" \
            '{source: $source, version: $version, packages: $packages}')

          # Dispatch to consumer repos
          REPOS=(
            "tinycloudlabs/OpenCredentials"
            "tinycloudlabs/remember"
            "tinycloudlabs/js-sdk"
            "tinycloudlabs/lightning"
          )

          for REPO in "${REPOS[@]}"; do
            echo "Dispatching dependency-bump to $REPO"
            curl -s -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: token $DISPATCH_TOKEN" \
              "https://api.github.com/repos/$REPO/dispatches" \
              -d "$(jq -nc --argjson payload "$PAYLOAD" '{event_type: "dependency-bump", client_payload: $payload}')"
          done
