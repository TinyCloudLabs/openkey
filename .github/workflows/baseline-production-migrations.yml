name: Baseline Production Migrations

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type baseline-origin-main-44305b4 exactly"
        required: true
        type: string

concurrency:
  group: production-api
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  baseline:
    name: Verify legacy schema, baseline, and migrate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check typed confirmation
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [ "$CONFIRMATION" != "baseline-origin-main-44305b4" ]; then
            echo "Confirmation did not match; production was not changed" >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify and record legacy migration baseline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENKEY_BASELINE_CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret not set; production was not changed" >&2
            exit 1
          fi
          bun run db:baseline:prod

      - name: Deploy and verify managed-account migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run db:migrate:deploy
