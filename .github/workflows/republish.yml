name: Republish Current Versions

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to republish (comma-separated, or "all")'
        type: string
        default: 'all'
        required: true

jobs:
  republish:
    name: Republish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Packages (no cache)
        run: npx turbo build --force

      - name: Configure npm auth
        run: |
          export NPM_TOKEN="${{ secrets.NPM_TOKEN }}"
          ./scripts/npm-auth.sh
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Resolve workspace dependencies
        run: ./scripts/resolve-workspace-deps.sh

      - name: Publish packages
        run: |
          INPUT="${{ github.event.inputs.packages }}"

          # All publishable packages
          ALL_PKGS="packages/core packages/types packages/sdk packages/cli packages/sdk-react-native"

          if [ "$INPUT" = "all" ]; then
            PKGS="$ALL_PKGS"
          else
            # Convert comma-separated names to paths
            PKGS=""
            IFS=',' read -ra NAMES <<< "$INPUT"
            for name in "${NAMES[@]}"; do
              name=$(echo "$name" | xargs) # trim whitespace
              # Handle both "@openkey/sdk" and "sdk" formats
              name="${name#@openkey/}"
              if [ -d "packages/$name" ]; then
                PKGS="$PKGS packages/$name"
              else
                echo "Warning: packages/$name not found, skipping"
              fi
            done
          fi

          for pkg in $PKGS; do
            if [ ! -f "$pkg/package.json" ]; then
              continue
            fi

            pkg_name=$(jq -r '.name' "$pkg/package.json")
            pkg_version=$(jq -r '.version' "$pkg/package.json")
            is_private=$(jq -r '.private // false' "$pkg/package.json")

            if [ "$is_private" = "true" ]; then
              echo "Skipping $pkg_name (private)"
              continue
            fi

            echo "Publishing $pkg_name@$pkg_version..."
            cd "$pkg"
            npm publish --access public 2>&1 || echo "  Failed or already published"
            cd "$GITHUB_WORKSPACE"
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
