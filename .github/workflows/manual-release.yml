name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version strategy (patch, minor, major)'
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/TinyCloudLabs/openkey.git

      - name: Create changeset
        run: |
          echo "Creating changeset for ${{ github.event.inputs.version }} release..."
          bun changeset add --empty

      - name: Version packages
        run: bun changeset version --${{ github.event.inputs.version }}

      - name: Build packages
        run: bun run build

      - name: Publish packages with npm directly
        run: |
          export NPM_TOKEN="${{ secrets.NPM_TOKEN }}"
          export NODE_AUTH_TOKEN="${{ secrets.NPM_TOKEN }}"

          echo "Publishing packages..."
          ROOT_DIR=$(pwd)

          # Publish SDK
          cd "$ROOT_DIR/packages/sdk"
          npm publish --access public

          # Publish types
          cd "$ROOT_DIR/packages/types"
          npm publish --access public

          # Publish db
          cd "$ROOT_DIR/packages/db"
          npm publish --access public

          # Publish tee
          cd "$ROOT_DIR/packages/tee"
          npm publish --access public

          cd "$ROOT_DIR"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Create tags
        run: |
          ROOT_DIR=$(pwd)

          cd "$ROOT_DIR/packages/sdk"
          SDK_VERSION=$(cat package.json | grep '"version"' | head -1 | awk -F: '{ print $2 }' | sed 's/[",]//g' | tr -d '[[:space:]]')
          git tag "sdk-v$SDK_VERSION"

          cd "$ROOT_DIR/packages/types"
          TYPES_VERSION=$(cat package.json | grep '"version"' | head -1 | awk -F: '{ print $2 }' | sed 's/[",]//g' | tr -d '[[:space:]]')
          git tag "types-v$TYPES_VERSION"

          cd "$ROOT_DIR/packages/db"
          DB_VERSION=$(cat package.json | grep '"version"' | head -1 | awk -F: '{ print $2 }' | sed 's/[",]//g' | tr -d '[[:space:]]')
          git tag "db-v$DB_VERSION"

          cd "$ROOT_DIR/packages/tee"
          TEE_VERSION=$(cat package.json | grep '"version"' | head -1 | awk -F: '{ print $2 }' | sed 's/[",]//g' | tr -d '[[:space:]]')
          git tag "tee-v$TEE_VERSION"

          cd "$ROOT_DIR"

      - name: Commit changes
        run: |
          git add .
          git commit -m "chore: release version [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main
          git push origin --tags

      - name: Create GitHub draft releases
        run: |
          # Create draft release for SDK
          echo "Creating draft release for sdk v$SDK_VERSION..."
          gh release create "sdk-v$SDK_VERSION" \
            --title "SDK v$SDK_VERSION" \
            --notes "Release notes for @openkey/sdk v$SDK_VERSION" \
            --draft

          # Create draft release for types
          echo "Creating draft release for types v$TYPES_VERSION..."
          gh release create "types-v$TYPES_VERSION" \
            --title "Types v$TYPES_VERSION" \
            --notes "Release notes for @openkey/types v$TYPES_VERSION" \
            --draft

          # Create draft release for db
          echo "Creating draft release for db v$DB_VERSION..."
          gh release create "db-v$DB_VERSION" \
            --title "DB v$DB_VERSION" \
            --notes "Release notes for @openkey/db v$DB_VERSION" \
            --draft

          # Create draft release for tee
          echo "Creating draft release for tee v$TEE_VERSION..."
          gh release create "tee-v$TEE_VERSION" \
            --title "TEE v$TEE_VERSION" \
            --notes "Release notes for @openkey/tee v$TEE_VERSION" \
            --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
