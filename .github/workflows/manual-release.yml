name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version strategy (patch, minor, major)'
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/TinyCloudLabs/openkey.git

      - name: Create changeset
        run: |
          echo "Creating changeset for ${{ github.event.inputs.version }} release..."
          bun changeset add --empty

      - name: Version packages
        run: bun changeset version --${{ github.event.inputs.version }}

      - name: Build packages
        run: bun run build

      - name: Resolve workspace dependencies
        run: ./scripts/resolve-workspace-deps.sh

      - name: Publish packages
        run: |
          export NPM_TOKEN="${{ secrets.NPM_TOKEN }}"
          ./scripts/npm-auth.sh

          ROOT_DIR=$(pwd)
          for pkg in packages/core packages/types packages/sdk packages/cli packages/sdk-react-native; do
            if [ ! -f "$pkg/package.json" ]; then
              continue
            fi

            pkg_name=$(jq -r '.name' "$pkg/package.json")
            pkg_version=$(jq -r '.version' "$pkg/package.json")
            is_private=$(jq -r '.private // false' "$pkg/package.json")

            if [ "$is_private" = "true" ]; then
              echo "Skipping $pkg_name (private)"
              continue
            fi

            echo "Publishing $pkg_name@$pkg_version..."
            cd "$ROOT_DIR/$pkg"
            npm publish --access public || echo "  Failed or already published"
          done

          cd "$ROOT_DIR"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit changes
        run: |
          git checkout -- .  # Revert workspace:* rewrites before committing
          git add .
          git commit -m "chore: release version [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main
          git push origin --tags
