name: Dependabot Changeset

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  changeset:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Get PR info
        id: pr
        run: |
          echo "title=${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
          echo "branch=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"

      - name: Generate changeset
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          CHANGESET_ID="dependabot-$(echo '${{ github.head_ref }}' | sed 's/[^a-zA-Z0-9]/-/g' | head -c 50)"

          # Build changeset header based on workspace packages
          HEADER="---"

          if [ -f "package.json" ]; then
            WORKSPACES=$(node -e "const p = require('./package.json'); (p.workspaces || []).forEach(w => { try { const wp = require('./' + w + '/package.json'); console.log(wp.name); } catch(e) {} })" 2>/dev/null || true)

            if [ -n "$WORKSPACES" ]; then
              while IFS= read -r pkg; do
                [ -n "$pkg" ] && HEADER="${HEADER}"$'\n'"\"${pkg}\": patch"
              done <<< "$WORKSPACES"
            else
              PKG_NAME=$(node -e "console.log(require('./package.json').name)" 2>/dev/null || echo "unknown")
              HEADER="${HEADER}"$'\n'"\"${PKG_NAME}\": patch"
            fi
          fi

          HEADER="${HEADER}"$'\n'"---"

          mkdir -p .changeset
          printf '%s\n\n%s\n' "$HEADER" "$PR_TITLE" > ".changeset/${CHANGESET_ID}.md"

          echo "Created changeset: .changeset/${CHANGESET_ID}.md"
          cat ".changeset/${CHANGESET_ID}.md"

      - name: Commit changeset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset/
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore: add changeset for dependabot update"
          git push
