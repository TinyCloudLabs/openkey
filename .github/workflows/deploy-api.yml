name: Deploy API to Phala Cloud

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'Dockerfile'
      - 'docker-compose.prod.yml'
      - 'scripts/baseline-production-migrations.ts'
      - 'scripts/verify-managed-account-migrations.ts'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: production-api
  cancel-in-progress: false

env:
  DOCKER_IMAGE: skgbafa/openkey-api

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest

      - name: Update compose with image tag
        run: |
          sed -i "s|\${DOCKER_IMAGE}|${{ env.DOCKER_IMAGE }}:${{ github.sha }}|g" docker-compose.prod.yml

      # Apply the tracked migrations before shipping the code. Raw migration SQL
      # installs custody and tenant-boundary guards that `prisma db push` omits.
      # The API container intentionally does not contain or run the schema engine.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Deploy and verify production migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret not set; refusing to deploy without migrations" >&2
            exit 1
          fi
          bun install --frozen-lockfile
          bun run db:migrate:deploy

      - name: Install Phala CLI
        run: npm install -g phala

      - name: Deploy to Phala Cloud
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          phala deploy \
            --api-token "$PHALA_CLOUD_API_KEY" \
            --cvm-id openkey-api \
            --compose docker-compose.prod.yml \
            --wait
