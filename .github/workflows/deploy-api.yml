name: Deploy API to Phala Cloud

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'Dockerfile'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  DOCKER_IMAGE: skgbafa/openkey-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest

      - name: Update compose with image tag
        run: |
          sed -i "s|\${DOCKER_IMAGE}|${{ env.DOCKER_IMAGE }}:${{ github.sha }}|g" docker-compose.prod.yml

      - name: Install Phala CLI
        run: npm install -g phala

      - name: Get CVM ID by name
        id: cvm
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          CVMS_JSON=$(phala cvms list --json)
          CVM_APP_ID=$(jq -r '
            def cvms:
              if type == "array" then .
              elif (.items? | type) == "array" then .items
              elif (.data?.items? | type) == "array" then .data.items
              elif (.data? | type) == "array" then .data
              elif (.cvms? | type) == "array" then .cvms
              else [] end;
            cvms[]
            | select((.cvmName // .name // .appName) == "openkey-api")
            | (.appId // .id // "")
          ' <<< "$CVMS_JSON" | head -n 1)

          if [ -z "$CVM_APP_ID" ] || [ "$CVM_APP_ID" = "null" ]; then
            echo "Error: CVM 'openkey-api' not found in Phala response"
            echo "Available CVMs:"
            jq -c '
              def cvms:
                if type == "array" then .
                elif (.items? | type) == "array" then .items
                elif (.data?.items? | type) == "array" then .data.items
                elif (.data? | type) == "array" then .data
                elif (.cvms? | type) == "array" then .cvms
                else [] end;
              cvms[] | {
                cvmName: (.cvmName // .name // .appName // null),
                appId: (.appId // .id // null),
                status: (.status // null)
              }
            ' <<< "$CVMS_JSON"
            exit 1
          fi

          if [[ "$CVM_APP_ID" == app_* ]]; then
            PHALA_APP_ID="$CVM_APP_ID"
          else
            PHALA_APP_ID="app_${CVM_APP_ID}"
          fi

          echo "app_id=${PHALA_APP_ID}" >> $GITHUB_OUTPUT
          echo "Found CVM: ${PHALA_APP_ID}"

      - name: Deploy to Phala Cloud
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: phala deploy --cvm-id ${{ steps.cvm.outputs.app_id }} -c docker-compose.prod.yml

      - name: Wait for deployment
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          echo "Waiting for CVM to be ready (up to 10 minutes)..."
          for i in {1..60}; do
            CVMS_JSON=$(phala cvms list --json)
            RAW=$(jq -c '
              def cvms:
                if type == "array" then .
                elif (.items? | type) == "array" then .items
                elif (.data?.items? | type) == "array" then .data.items
                elif (.data? | type) == "array" then .data
                elif (.cvms? | type) == "array" then .cvms
                else [] end;
              cvms[]
              | select((.cvmName // .name // .appName) == "openkey-api")
              | {status: (.status // null), cvmName: (.cvmName // .name // .appName // null)}
            ' <<< "$CVMS_JSON" | head -n 1)
            STATUS=$(echo "$RAW" | jq -r '.status // empty')

            if [ -z "$STATUS" ]; then
              echo "CVM 'openkey-api' not found while waiting for deployment"
              jq -c '
                def cvms:
                  if type == "array" then .
                  elif (.items? | type) == "array" then .items
                  elif (.data?.items? | type) == "array" then .data.items
                  elif (.data? | type) == "array" then .data
                  elif (.cvms? | type) == "array" then .cvms
                  else [] end;
                cvms[] | {
                  cvmName: (.cvmName // .name // .appName // null),
                  appId: (.appId // .id // null),
                  status: (.status // null)
                }
              ' <<< "$CVMS_JSON"
              exit 1
            fi

            echo "Attempt $i/60: Status = '$STATUS'"
            if [ "$STATUS" = "running" ]; then
              echo "CVM is running!"
              exit 0
            fi
            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "error" ]; then
              echo "CVM deployment failed with status: $STATUS"
              echo "$RAW"
              exit 1
            fi
            sleep 10
          done
          echo "Timeout waiting for CVM after 10 minutes"
          echo "$RAW"
          exit 1
