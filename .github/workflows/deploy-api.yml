name: Deploy API to Phala Cloud

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'Dockerfile'
      - 'docker-compose.prod.yml'
  workflow_dispatch:

env:
  DOCKER_IMAGE: skgbafa/openkey-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update compose with image tag
        run: |
          sed -i "s|\${DOCKER_IMAGE}|${{ env.DOCKER_IMAGE }}:${{ github.sha }}|g" docker-compose.prod.yml

      - name: Install Phala CLI
        run: npm install -g phala

      - name: Get CVM ID by name
        id: cvm
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          CVM_APP_ID=$(phala cvms list --json | jq -r '.items[] | select(.cvmName == "openkey-api") | .appId')
          if [ -z "$CVM_APP_ID" ]; then
            echo "Error: CVM 'openkey-api' not found"
            exit 1
          fi
          echo "app_id=app_${CVM_APP_ID}" >> $GITHUB_OUTPUT
          echo "Found CVM: app_${CVM_APP_ID}"

      - name: Deploy to Phala Cloud
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: phala deploy --cvm-id ${{ steps.cvm.outputs.app_id }} -c docker-compose.prod.yml --wait
