name: Deploy API to Phala Cloud

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'Dockerfile'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  DOCKER_IMAGE: skgbafa/openkey-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest

      - name: Update compose with image tag
        run: |
          sed -i "s|\${DOCKER_IMAGE}|${{ env.DOCKER_IMAGE }}:${{ github.sha }}|g" docker-compose.prod.yml

      # Sync the prod Postgres schema to the deployed code BEFORE shipping it.
      # The Phala TEE can't run Prisma's schema-engine, so the schema must be
      # pushed from CI (where the engine works) rather than at container start.
      # Requires DATABASE_URL to be added as a GitHub Actions secret; until then
      # this step skips gracefully so deploys keep working.
      # NOTE: no --accept-data-loss — destructive changes fail the step (and block
      # the later Phala deploy) instead of silently dropping data.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Sync prod DB schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret not set; skipping prod schema sync"
            exit 0
          fi
          bun install
          bun node_modules/.bin/prisma db push --schema=./packages/db/prisma/schema.prisma

      - name: Install Phala CLI
        run: npm install -g phala

      - name: Deploy to Phala Cloud
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          phala deploy \
            --api-token "$PHALA_CLOUD_API_KEY" \
            --cvm-id openkey-api \
            --compose docker-compose.prod.yml \
            --wait
