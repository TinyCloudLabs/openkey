services:
  api:
    image: ${DOCKER_IMAGE}
    ports:
      - "3001:3001"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
    environment:
      - NODE_ENV=production
      - DSTACK_SIMULATOR_ENDPOINT=/var/run/dstack.sock
      - DATABASE_URL=${DATABASE_URL}
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID}
      - WEBAUTHN_ORIGIN=${WEBAUTHN_ORIGIN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - TEE_MODE=${TEE_MODE}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - API_PORT=${API_PORT}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    restart: unless-stopped

  dstack-ingress:
    image: dstacktee/dstack-ingress:20250924@sha256:40429d78060ef3066b5f93676bf3ba7c2e9ac47d4648440febfdda558aed4b32
    ports:
      - "443:443"
    depends_on:
      - api
    environment:
      - DOMAIN=api.openkey.so
      - TARGET_ENDPOINT=http://api:3001
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - GATEWAY_DOMAIN=_.${DSTACK_GATEWAY_DOMAIN}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - SET_CAA=true
      - DNS_PROVIDER=cloudflare
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - cert-data:/etc/letsencrypt
    restart: unless-stopped

volumes:
  cert-data:
