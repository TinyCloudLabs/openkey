version: "3.8"

services:
  api:
    image: skgbafa/openkey-api:v1.0.0
    ports:
      - "3001:3001"
    env_file:
      - .env.prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dstack-ingress:
    image: phalanetwork/dstack-ingress:latest
    depends_on:
      - api
    environment:
      - DOMAIN=api.openkey.so
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - SET_CAA=true
      - DNS_PROVIDER=cloudflare
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    restart: unless-stopped
